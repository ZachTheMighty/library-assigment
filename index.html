<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <h1>My Library</h1>
    <button command="show-modal" commandfor="add-book">Add Book</button>

    <dialog id="add-book">
      <div>
        <h2>Add Book</h2>
        <button command="close" commandfor="add-book">&#10005;</button>
      </div>
      <form action="">
        <div>
          <label for="title">Title</label
          ><input
            type="text"
            name="title"
            id="title"
            maxlength="20"
            autocomplete="off"
            required
          />
        </div>
        <div>
          <label for="author">Author</label
          ><input
            type="text"
            name="author"
            id="author"
            maxlength="20"
            autocomplete="off"
            required
          />
        </div>
        <div>
          <label for="num-of-pages">Number of Pages</label
          ><input
            type="number"
            name="numOfPages"
            id="num-of-pages"
            max="20000"
            autocomplete="off"
            placeholder="max 20000"
            required
          />
        </div>
        <div>
          <p>Have you read this book?</p>
          <div>
            <input
              type="radio"
              name="haveRead"
              id="yes"
              autocomplete="off"
              required
            /><label for="yes">Yes</label>
            <input type="radio" name="haveRead" id="no" autocomplete="off" />
            <label for="no">no</label>
          </div>
        </div>

        <button>Add book to library</button>
      </form>
    </dialog>

    <main></main>
  </body>
</html>
